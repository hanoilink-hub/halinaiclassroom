name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      #       - name: Install Apple Certificate
      #         env:
      #           CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #           CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #         run: |
      #           CERT_PATH=$RUNNER_TEMP/certificate.p12
      #           KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
      # 
      #           echo -n "$CERTIFICATE" | base64 --decode -o $CERT_PATH
      # 
      #           security create-keychain -p "" $KEYCHAIN_PATH
      #           security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
      #           security unlock-keychain -p "" $KEYCHAIN_PATH
      #           security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
      #           security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
      #           security list-keychains -d user -s $KEYCHAIN_PATH login.keychain

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app (unsigned)
        env:
          TAURI_SKIP_SIGNING: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/release/bundle/dmg/*.dmg

  build-macos-intel:
    runs-on: macos-14  # Cross-compile to Intel
    steps:
      - uses: actions/checkout@v4

      #       - name: Install Apple Certificate
      #         env:
      #           CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      #           CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #         run: |
      #           CERT_PATH=$RUNNER_TEMP/certificate.p12
      #           KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
      # 
      #           echo -n "$CERTIFICATE" | base64 --decode -o $CERT_PATH
      # 
      #           security create-keychain -p "" $KEYCHAIN_PATH
      #           security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
      #           security unlock-keychain -p "" $KEYCHAIN_PATH
      #           security import $CERT_PATH -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
      #           security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
      #           security list-keychains -d user -s $KEYCHAIN_PATH login.keychain

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app (Intel, unsigned)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          TAURI_SKIP_SIGNING: true
        run: npm run tauri build -- --target x86_64-apple-darwin










      - name: Upload macOS Intel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-intel-build
          path: |
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
            src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig

  release:
    needs: [build-macos, build-macos-intel, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: Download macOS Intel artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-intel-build
          path: artifacts/macos-intel

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: List artifacts
        run: find artifacts -type f | head -30

      - name: Rename macOS artifacts to include arch
        run: |
          # Rename aarch64 tar.gz to include arch
          for f in artifacts/macos/macos/*.app.tar.gz; do
            [ -f "$f" ] && mv "$f" "${f%.app.tar.gz}_aarch64.app.tar.gz"
          done
          for f in artifacts/macos/macos/*.app.tar.gz.sig; do
            [ -f "$f" ] && mv "$f" "${f%.app.tar.gz.sig}_aarch64.app.tar.gz.sig"
          done
          # Rename x86_64 tar.gz to include arch
          for f in artifacts/macos-intel/macos/*.app.tar.gz; do
            [ -f "$f" ] && mv "$f" "${f%.app.tar.gz}_x64.app.tar.gz"
          done
          for f in artifacts/macos-intel/macos/*.app.tar.gz.sig; do
            [ -f "$f" ] && mv "$f" "${f%.app.tar.gz.sig}_x64.app.tar.gz.sig"
          done
          echo "Renamed artifacts:"
          find artifacts -name "*.tar.gz*" -type f

      - name: Generate latest.json for updater
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Read signatures
          DARWIN_AARCH64_SIG=$(cat artifacts/macos/macos/*_aarch64.app.tar.gz.sig 2>/dev/null || echo "")
          DARWIN_X86_64_SIG=$(cat artifacts/macos-intel/macos/*_x64.app.tar.gz.sig 2>/dev/null || echo "")
          WINDOWS_X86_64_SIG=$(cat artifacts/windows/nsis/*.exe.sig 2>/dev/null || echo "")

          REPO="https://github.com/hanoilink-hub/halinaiclassroom/releases/download/v${VERSION}"

          # Find actual filenames. The previous `ls | xargs basename` pipeline broke
          # on filenames containing spaces (e.g. "HaLin AI Platform_aarch64.app.tar.gz")
          # because xargs splits on whitespace, producing an empty result. Use a glob
          # + array indexing pattern so the space is preserved as a single token, then
          # urlencode the filename before embedding it in the JSON URL.
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1]))" "$1"
          }
          # GitHub Release server rewrites spaces in uploaded asset filenames to `.`
          # (so "HaLin AI Platform_x64.app.tar.gz" lands at
          # "HaLin.AI.Platform_x64.app.tar.gz"). Apply the same transform to the
          # filename we embed in latest.json so the URL resolves on the server side.
          gh_release_normalize() {
            printf '%s' "$1" | sed 's/ /./g'
          }
          pick_first() {
            local pattern="$1"
            local files=( $pattern )
            # Use literal shell glob; if no match, files[0] will be the pattern string.
            shopt -s nullglob
            files=( $pattern )
            shopt -u nullglob
            if [ ${#files[@]} -eq 0 ]; then
              echo ""
            else
              basename "${files[0]}"
            fi
          }

          DARWIN_AARCH64_FILE=$(pick_first "artifacts/macos/macos/*_aarch64.app.tar.gz")
          DARWIN_X86_64_FILE=$(pick_first "artifacts/macos-intel/macos/*_x64.app.tar.gz")
          WINDOWS_X86_64_FILE=$(pick_first "artifacts/windows/nsis/*.exe")

          # Sanity check — fail the job if any filename is empty rather than silently
          # producing a broken latest.json with empty URLs.
          if [ -z "$DARWIN_AARCH64_FILE" ] || [ -z "$DARWIN_X86_64_FILE" ] || [ -z "$WINDOWS_X86_64_FILE" ]; then
            echo "::error::One or more installer filenames could not be resolved"
            echo "DARWIN_AARCH64_FILE='$DARWIN_AARCH64_FILE'"
            echo "DARWIN_X86_64_FILE='$DARWIN_X86_64_FILE'"
            echo "WINDOWS_X86_64_FILE='$WINDOWS_X86_64_FILE'"
            echo "--- artifacts tree ---"
            find artifacts -type f
            exit 1
          fi

          # Apply the GitHub-side rename FIRST, then urlencode anything else (e.g.
          # parentheses, apostrophes) so the embedded URL is safe regardless of
          # what the bundle name expands to in future versions.
          DARWIN_AARCH64_FILE_ENC=$(urlencode "$(gh_release_normalize "$DARWIN_AARCH64_FILE")")
          DARWIN_X86_64_FILE_ENC=$(urlencode "$(gh_release_normalize "$DARWIN_X86_64_FILE")")
          WINDOWS_X86_64_FILE_ENC=$(urlencode "$(gh_release_normalize "$WINDOWS_X86_64_FILE")")

          cat > artifacts/latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes at https://github.com/hanoilink-hub/halinaiclassroom/releases/tag/v${VERSION}",
            "pub_date": "${DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${REPO}/${DARWIN_AARCH64_FILE_ENC}"
              },
              "darwin-x86_64": {
                "signature": "${DARWIN_X86_64_SIG}",
                "url": "${REPO}/${DARWIN_X86_64_FILE_ENC}"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_X86_64_SIG}",
                "url": "${REPO}/${WINDOWS_X86_64_FILE_ENC}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Publish ngay khi build xong — Tauri auto-updater trên máy giáo viên
          # sẽ thấy bản mới trong vòng vài phút. Đổi lại `draft: true` nếu muốn
          # review trước khi mở cho user.
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.app.tar.gz
            artifacts/**/*.sig
            artifacts/latest.json
